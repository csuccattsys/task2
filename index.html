<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2: Advanced Interactive Learning Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #f4fbf7 0%, #e8f5e9 100%);
        }
        .neo-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(27, 94, 32, 0.12);
        }
        .highlight-connector {
            background-color: #fef08a;
            border-bottom: 2px dashed #ca8a04;
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 700;
        }
        .highlight-target {
            background-color: #bfdbfe;
            border-bottom: 2px dashed #2563eb;
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 700;
        }
        /* Fluid Interface Animations */
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-scale-in {
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }
        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(27, 94, 32, 0.2); }
            50% { transform: scale(1.01); box-shadow: 0 0 0 8px rgba(27, 94, 32, 0); }
        }
        .pulse-active {
            animation: subtlePulse 2.5s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 antialiased">

<div class="w-full max-w-3xl neo-card rounded-3xl shadow-2xl overflow-hidden border-b-8 border-green-900 animate-scale-in">
    
    <div class="bg-gray-100 h-2 w-full tracking-wide relative">
        <div id="ui-progress" class="bg-gradient-to-r from-green-600 to-green-800 h-full w-0 transition-all duration-500 cubic-bezier(0.4, 0, 0.2, 1)"></div>
    </div>

    <div class="bg-gradient-to-br from-green-950 via-green-900 to-green-800 text-white p-6 md:p-8 border-b border-green-700/20">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <div class="flex items-center gap-2.5">
                    <div class="p-2 bg-green-800/60 rounded-xl border border-green-600/30">
                        <i data-lucide="shield" class="w-6 h-6 text-green-400"></i>
                    </div>
                    <div>
                        <h1 class="text-xl md:text-2xl font-extrabold tracking-tight">THE RHETORIC LAB</h1>
                        <p class="text-xs text-green-300 font-medium tracking-wide mt-0.5">Interactive Cognitive Engine • Grade 7</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3 self-start md:self-center">
                <div class="bg-black/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 flex items-center gap-2">
                    <i data-lucide="zap" class="w-4 h-4 text-amber-400 fill-amber-400"></i>
                    <span class="text-xs font-bold uppercase text-green-300">XP Points</span>
                    <span id="score" class="font-black text-xl text-white">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="p-6 md:p-8 space-y-6">
        
        <div id="strategy-panel" class="bg-gradient-to-r from-green-50 to-emerald-50/50 border border-green-100 rounded-2xl p-5 flex items-start gap-4 transition-all">
            <div class="p-3 bg-white rounded-xl text-green-800 shadow-sm border border-green-100 shrink-0">
                <i data-lucide="lightbulb" class="w-5 h-5 text-green-700 fill-green-100"></i>
            </div>
            <div class="space-y-1">
                <h3 class="text-xs font-extrabold text-green-900 uppercase tracking-wider">Cognitive Reading Strategy</h3>
                <p id="strategy-text" class="text-sm text-gray-700 font-medium leading-relaxed">Analyzing component paths...</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span id="node-badge" class="bg-green-100 text-green-900 text-xs font-extrabold px-3 py-1 rounded-full uppercase tracking-widest border border-green-200">Node 01</span>
                <div id="interactive-tools" class="flex gap-2">
                    <button id="btn-highlight" class="flex items-center gap-1.5 px-3 py-1 bg-white border border-gray-200 hover:border-blue-400 text-xs font-bold text-gray-600 rounded-lg transition-all">
                        <i data-lucide="highlighter" class="w-3.5 h-3.5 text-blue-500"></i>
                        <span>X-Ray Clues</span>
                    </button>
                </div>
            </div>

            <h2 id="node-title" class="text-xl font-bold text-gray-900 tracking-tight">Loading Challenge Scenario...</h2>
            
            <div class="relative bg-gray-50 border border-gray-200/60 rounded-2xl p-6 shadow-sm">
                <div class="absolute -top-3 left-4 bg-white px-2 text-xs font-bold text-gray-400 uppercase tracking-wider">Source Material</div>
                <p id="narrative-display" class="text-gray-800 font-semibold text-base leading-relaxed italic"></p>
            </div>
        </div>

        <div id="choices-grid" class="grid grid-cols-1 gap-3.5"></div>

        <div id="diagnostic-hub" class="hidden rounded-2xl border p-6 space-y-4 shadow-xl transition-all duration-300 transform scale-95">
            <div class="flex items-start gap-4">
                <div id="diagnostic-icon-container" class="p-3.5 rounded-xl text-white shrink-0 shadow-md">
                    <i id="diagnostic-icon" class="w-6 h-6"></i>
                </div>
                <div class="space-y-1 flex-1">
                    <span id="diagnostic-status-tag" class="text-xs font-black uppercase tracking-widest block">STATUS</span>
                    <h4 id="diagnostic-heading" class="text-lg font-bold text-gray-900">Heading Text</h4>
                    <p id="diagnostic-body" class="text-sm text-gray-600 font-medium leading-relaxed"></p>
                </div>
            </div>

            <div id="breakdown-card" class="bg-white/80 border rounded-xl p-4 space-y-2">
                <h5 class="text-xs font-extrabold uppercase tracking-wider text-gray-400 flex items-center gap-1.5">
                    <i data-lucide="binary" class="w-4 h-4 text-gray-400"></i>
                    Structural Grammar Analysis
                </h5>
                <p id="breakdown-text" class="text-xs text-gray-600 font-medium leading-relaxed"></p>
            </div>
        </div>

        <div class="flex justify-end pt-2">
            <button id="action-advance" class="hidden items-center gap-2 bg-gradient-to-r from-green-700 to-green-800 hover:from-green-800 hover:to-green-900 text-white font-bold px-7 py-3.5 rounded-xl shadow-lg shadow-green-900/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                <span>Advance Module</span>
                <i data-lucide="arrow-right-circle" class="w-4 h-4"></i>
            </button>
            <button id="action-recalibrate" class="hidden items-center gap-2 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-bold px-7 py-3.5 rounded-xl shadow-lg shadow-red-700/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                <span>Recalibrate Concepts</span>
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
        </div>

    </div>
</div>

<script>
    // Robust Structural Linguistics Dataset mapping linguistic items and active clues
    const matrixData = {
        1: {
            title: "The Ancient Ruins Entrance",
            badge: "Trial Node 01",
            strategy: "Isolate terms of identity. When a text declares an entity directly equals a symbol without mapping verbs like 'as', a metaphor is locked.",
            textNormal: "You approach the stone gate. The script reads: 'The classroom was a zoo during recess.' An automated prompt requests the figure of speech.",
            textHighlighted: "You approach the stone gate. The script reads: 'The <span class='highlight-target'>classroom</span> <span class='highlight-connector'>was a zoo</span> during recess.' An automated prompt requests the figure of speech.",
            choices: [
                {
                    label: "Deploy Simile Diagnostic Key",
                    type: "trap",
                    icon: "info",
                    bgClass: "bg-amber-500",
                    heading: "Structural Alignment Error",
                    body: "Similes require direct comparative bridges. The system rejected this option because no comparative metrics or structural linking parameters were isolated.",
                    analysis: "To transform this text into a simile blueprint, it would need to read: 'The classroom was LIKE a zoo'. Because the statement strips away the connector word, it declares direct operational equivalence instead."
                },
                {
                    label: "Inject Metaphor Parameter",
                    type: "success",
                    icon: "check-circle",
                    bgClass: "bg-green-600",
                    heading: "Linguistic Alignment Locked!",
                    body: "The parameter was accepted cleanly! The direct replacement of the classroom context with a high-energy environment demonstrates a metaphor design model.",
                    analysis: "Metaphor modules map the sensory characteristics of a secondary element ('zoo') straight onto a primary host ('classroom') to maximize imaginative communication efficiency.",
                    xp: 50,
                    jump: 2
                }
            ]
        },
        2: {
            title: "The Whispering Courtyard Corridor",
            badge: "Trial Node 02",
            strategy: "Audit subject action states. Human-exclusive verbs mapped directly to natural, inanimate hosts indicate active personification.",
            textNormal: "A strong current sweeps across the path: 'The autumn leaves scraped across the pavement, whispering secrets to the wind.' The digital interface prompts for identification.",
            textHighlighted: "A strong current sweeps across the path: 'The <span class='highlight-target'>autumn leaves</span> scraped across the pavement, <span class='highlight-connector'>whispering secrets</span> to the wind.' The digital interface prompts for identification.",
            choices: [
                {
                    label: "Inject Personification Module",
                    type: "success",
                    icon: "check-circle",
                    bgClass: "bg-green-600",
                    heading: "Linguistic Alignment Locked!",
                    body: "Synthesis successful! Giving human speech traits to leaves maps human animation attributes to nature.",
                    analysis: "Personification acts as an analytical lens, allowing authors to translate organic behaviors into human expressions like sharing secrets, which builds student-text relationships.",
                    xp: 50,
                    jump: 3
                },
                {
                    label: "Deploy Metaphor Parameter",
                    type: "trap",
                    icon: "info",
                    bgClass: "bg-amber-500",
                    heading: "Structural Alignment Error",
                    body: "Metaphors declare identity status rather than actions. The terminal flags this choice as a mismatched logical category error.",
                    analysis: "The script does not state that leaves *are* people; it merely projects individual human actions onto them. Thus, personification rules apply here."
                }
            ]
        },
        3: {
            title: "The Core Vault Crypt",
            badge: "Final Trial",
            strategy: "Calibrate statements against empirical possibility. Intentional distortions that magnify scales past biological limits signify hyperbole.",
            textNormal: "A lockbox demands data confirmation. The prompt reads: 'I am so hungry I could eat an entire elephant right now!' State the matching figure of speech.",
            textHighlighted: "A lockbox demands data confirmation. The prompt reads: 'I am so hungry I <span class='highlight-connector'>could eat an entire elephant</span> right now!' State the matching figure of speech.",
            choices: [
                {
                    label: "Inject Simile Diagnostic Key",
                    type: "trap",
                    icon: "info",
                    bgClass: "bg-amber-500",
                    heading: "Structural Alignment Error",
                    body: "The prompt fails structural criteria checks. No explicit grammatical comparison tools were located in this data sequence.",
                    analysis: "A simile maps proportional values using specific comparative words. Without 'like' or 'as' embedded within the core phrase structure, a simile cannot form."
                },
                {
                    label: "Deploy Hyperbole Parameter",
                    type: "success",
                    icon: "trophy",
                    bgClass: "bg-green-600",
                    heading: "Vault Successfully Unlocked!",
                    body: "Linguistic synchronization complete! The system verified the statement as an intentional exaggeration designed to measure intense states.",
                    analysis: "Hyperbole uses magnification mechanisms rather than literal declarations. Eating an entire elephant emphasizes severe hunger, bypassing a literal context to express scale.",
                    xp: 50,
                    jump: "end"
                }
            ]
        }
    };

    let currentNode = 1;
    let pointSystemXP = 0;
    let overlayModeXray = false;

    function renderNodeWorkspace(nodeId) {
        // Sync Vector Graphics engine instances
        setTimeout(() => lucide.createIcons(), 10);

        // Core progress calculations
        const totalNodes = Object.keys(matrixData).length;
        const widthPct = nodeId === 'end' ? 100 : ((nodeId - 1) / totalNodes) * 100;
        document.getElementById('ui-progress').style.width = `${widthPct}%`;

        if (nodeId === 'end') {
            document.getElementById('strategy-panel').remove();
            document.getElementById('interactive-tools').remove();
            document.getElementById('node-badge').innerText = "System Safe";
            document.getElementById('node-title').innerText = "Core Calibration Finalized";
            document.getElementById('narrative-display').innerHTML = `🏆 <strong>Mission Success!</strong> All architectural checkpoints have been calibrated correctly. Grade 7 Rhetoric Mastery matrices are operating optimally with a final score of <span class='text-green-700 font-extrabold'>${pointSystemXP} XP</span>.`;
            document.getElementById('choices-grid').innerHTML = "";
            document.getElementById('diagnostic-hub').className = "hidden";
            document.getElementById('action-advance').className = "hidden";
            document.getElementById('action-recalibrate').className = "hidden";
            return;
        }

        const activeNode = matrixData[nodeId];
        
        // Update Terminal Labels
        document.getElementById('node-badge').innerText = activeNode.badge;
        document.getElementById('node-title').innerText = activeNode.title;
        document.getElementById('strategy-text').innerText = activeNode.strategy;
        
        // Render Text state based on Clue settings
        document.getElementById('narrative-display').innerHTML = overlayModeXray ? activeNode.textHighlighted : activeNode.textNormal;

        // Reset Interface Blocks
        document.getElementById('diagnostic-hub').className = "hidden animate-scale-in";
        document.getElementById('action-advance').className = "hidden";
        document.getElementById('action-recalibrate').className = "hidden";

        // Assemble Component Option Slots
        const choiceContainer = document.getElementById('choices-grid');
        choiceContainer.innerHTML = "";

        activeNode.choices.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left bg-white hover:bg-green-50/20 border-2 border-gray-200 hover:border-green-800 px-5 py-4 rounded-xl font-bold text-gray-700 text-sm transition-all flex justify-between items-center group active:scale-[0.99]";
            btn.innerHTML = `
                <span>${opt.label}</span>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 opacity-40 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
            `;
            btn.onclick = () => evaluateChoiceMechanic(opt);
            choiceContainer.appendChild(btn);
        });

        setTimeout(() => lucide.createIcons(), 10);
    }

    function evaluateChoiceMechanic(opt) {
        const hub = document.getElementById('diagnostic-hub');
        const iconBox = document.getElementById('diagnostic-icon-container');
        const iconView = document.getElementById('diagnostic-icon');
        const tag = document.getElementById('diagnostic-status-tag');
        
        // Lock options matrix
        document.querySelectorAll('#choices-grid button').forEach(b => b.disabled = true);

        // Update Frame values
        document.getElementById('diagnostic-heading').innerText = opt.heading;
        document.getElementById('diagnostic-body').innerText = opt.body;
        document.getElementById('breakdown-text').innerText = opt.analysis;

        // Sync visual color matrices
        hub.classList.remove('hidden', 'border-red-200', 'bg-red-50/70', 'border-green-200', 'bg-green-50/70');
        iconBox.className = `p-3.5 rounded-xl text-white shrink-0 shadow-md ${opt.bgClass}`;
        iconView.setAttribute('data-lucide', opt.icon);

        if (opt.type === "success") {
            // Update Score Tracker values
            pointSystemXP += opt.xp;
            document.getElementById('score').innerText = pointSystemXP;

            hub.classList.add('border-green-200', 'bg-green-50/70');
            tag.className = "text-xs font-black uppercase tracking-widest block text-green-700";
            tag.innerText = "System Synced";

            const advanceBtn = document.getElementById('action-advance');
            advanceBtn.className = "inline-flex items-center gap-2 bg-gradient-to-r from-green-700 to-green-800 hover:from-green-800 hover:to-green-900 text-white font-bold px-7 py-3.5 rounded-xl shadow-lg shadow-green-900/20 transition-all transform hover:-translate-y-0.5";
            advanceBtn.onclick = () => {
                currentNode = opt.jump;
                renderNodeWorkspace(currentNode);
            };
        } else {
            hub.classList.add('border-amber-200', 'bg-amber-50/70');
            tag.className = "text-xs font-black uppercase tracking-widest block text-amber-700";
            tag.innerText = "Conflict Flagged";

            const resetBtn = document.getElementById('action-recalibrate');
            resetBtn.className = "inline-flex items-center gap-2 bg-gradient-to-r from-amber-600 to-amber-700 hover:from-amber-700 hover:from-amber-800 text-white font-bold px-7 py-3.5 rounded-xl shadow-lg shadow-amber-700/20 transition-all transform hover:-translate-y-0.5";
            resetBtn.onclick = () => renderNodeWorkspace(currentNode);
        }

        hub.classList.remove('hidden');
        setTimeout(() => lucide.createIcons(), 10);
    }

    // Connect X-Ray structural highlighter toggle elements
    document.getElementById('btn-highlight').onclick = function() {
        overlayModeXray = !overlayModeXray;
        this.classList.toggle('border-blue-500');
        this.classList.toggle('bg-blue-50');
        this.classList.toggle('text-blue-700');
        
        // Re-render source string module with highlighted nodes
        const activeNode = matrixData[currentNode];
        document.getElementById('narrative-display').innerHTML = overlayModeXray ? activeNode.textHighlighted : activeNode.textNormal;
    };

    // Run Initial application entry validation sequence
    renderNodeWorkspace(currentNode);
</script>

</body>
</html>
