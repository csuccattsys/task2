<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhetoric Arena: Battle for Cabadbaran</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons Vector Framework -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .hud-font {
            font-family: 'Orbitron', sans-serif;
        }
        /* Custom Keyframe Animations for Physics and Hits */
        @keyframes damageFlash {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(239, 68, 68, 0.4); }
        }
        .animate-flash {
            animation: damageFlash 0.3s ease-in-out 2;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s infinite ease-in-out;
        }
        @keyframes enemySpawn {
            from { opacity: 0; transform: scale(0.6) rotate(-10deg); filter: brightness(2); }
            to { opacity: 1; transform: scale(1) rotate(0deg); filter: brightness(1); }
        }
        .animate-spawn {
            animation: enemySpawn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-6 select-none">

<div id="game-arena" class="w-full max-w-4xl bg-slate-900 border-2 border-slate-700/50 rounded-3xl shadow-2xl overflow-hidden relative flex flex-col h-[640px]">
    
    <!-- TOP HUD: Real-time Interactive Combat Status -->
    <div class="bg-slate-950 px-6 py-4 border-b border-slate-800 flex flex-wrap items-center justify-between gap-4 z-10">
        <!-- Player Vitramins -->
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-500/10 border border-blue-500/30 flex items-center justify-center text-blue-400 shadow-lg shadow-blue-500/10">
                <i data-lucide="shield-user" class="w-5 h-5"></i>
            </div>
            <div>
                <div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 hud-font">Player HP</div>
                <div class="w-32 bg-slate-800 h-2.5 rounded-full overflow-hidden border border-slate-700 mt-1">
                    <div id="player-hp-bar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full w-100 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <!-- Combo Score / Streak Multiplier -->
        <div class="flex items-center gap-6">
            <div class="text-center">
                <div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 hud-font">Score</div>
                <div id="score-val" class="text-xl font-black text-amber-400 hud-font">0000</div>
            </div>
            <div class="bg-slate-900 px-3 py-1.5 rounded-xl border border-slate-800 text-center min-w-[70px]">
                <div class="text-[9px] uppercase font-black text-emerald-400 hud-font tracking-tight">Streak</div>
                <div id="streak-val" class="text-base font-black text-white hud-font">x0</div>
            </div>
        </div>

        <!-- Enemy Vitramins -->
        <div class="flex items-center gap-3">
            <div class="text-right">
                <div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 hud-font">Guardian Armor</div>
                <div class="w-32 bg-slate-800 h-2.5 rounded-full overflow-hidden border border-slate-700 mt-1 flex justify-end">
                    <div id="enemy-hp-bar" class="bg-gradient-to-r from-red-500 to-pink-500 h-full w-100 transition-all duration-300"></div>
                </div>
            </div>
            <div class="w-10 h-10 rounded-xl bg-red-500/10 border border-red-500/30 flex items-center justify-center text-red-400 shadow-lg shadow-red-500/10">
                <i data-lucide="swords" class="w-5 h-5"></i>
            </div>
        </div>
    </div>

    <!-- MAIN BATTLEFIELD VIEW (Interactive Arena Graphics Floor) -->
    <div id="combat-floor" class="flex-1 bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 relative p-6 flex flex-col justify-between overflow-hidden">
        
        <!-- Interactive Clue Scanner Deck Overlays -->
        <div class="absolute top-4 left-4 z-10 flex gap-2">
            <button id="btn-scan" class="flex items-center gap-1.5 px-3 py-2 bg-slate-900/90 border border-cyan-500/40 hover:border-cyan-400 hover:bg-cyan-950/20 rounded-xl text-xs font-bold text-cyan-400 transition-all shadow-lg backdrop-blur-md">
                <i data-lucide="scan-eye" class="w-4 h-4 animate-pulse"></i>
                <span>Deploy X-Ray Scanner</span>
            </button>
        </div>

        <!-- Dynamic Monster Graphic Representation Frame -->
        <div class="flex-1 flex flex-col items-center justify-center my-4 animate-float">
            <div id="enemy-sprite-container" class="relative group">
                <!-- Target Lock Indicator Rings -->
                <div class="absolute inset-0 border border-dashed border-red-500/30 rounded-full scale-125 animate-spin [animation-duration:20s]"></div>
                <div class="absolute inset-0 border border-dotted border-cyan-500/20 rounded-full scale-150 animate-spin [animation-duration:35s] [animation-direction:reverse]"></div>
                
                <div id="enemy-avatar-wrapper" class="p-8 bg-slate-900/80 border-2 border-red-500/40 rounded-full shadow-2xl shadow-red-500/10 backdrop-blur-sm animate-spawn">
                    <i id="enemy-icon" data-lucide="bot-off" class="w-20 h-20 text-red-400 drop-shadow-[0_0_15px_rgba(239,68,68,0.3)]"></i>
                </div>
            </div>
            <h3 id="enemy-name" class="text-sm font-black text-red-400 uppercase tracking-widest mt-4 hud-font">Rhetoric Sentinel v1.0</h3>
        </div>

        <!-- Central Display Panel: The Sentence Engine Core -->
        <div class="w-full bg-slate-950/80 border border-slate-800 rounded-2xl p-5 shadow-2xl backdrop-blur-md relative z-10">
            <div class="absolute -top-3 left-6 bg-indigo-600 text-white text-[9px] font-black uppercase tracking-widest px-2.5 py-0.5 rounded border border-indigo-400 shadow-md">Intercepted Inscription</div>
            <p id="riddle-string" class="text-base md:text-lg text-slate-100 font-bold tracking-wide leading-relaxed pt-1 select-text"></p>
        </div>
    </div>

    <!-- INTERACTIVE CONTROL BOARD: Weapon Matrix Deck -->
    <div class="bg-slate-950 border-t border-slate-800 p-6 z-10">
        <div class="text-[10px] text-slate-500 font-extrabold uppercase tracking-widest mb-3 hud-font">Select Targeting Sub-Routine ammunition:</div>
        <div id="attack-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <!-- Programmatic Target Actions will render here -->
        </div>
    </div>

    <!-- INTERACTIVE LEARNING & ANALYSIS PANEL (Slide-Up Shield Overlay) -->
    <div id="learning-terminal" class="hidden absolute inset-0 bg-slate-950/98 z-20 p-6 flex flex-col justify-between border-t-4 border-indigo-500 animate-spawn">
        <div class="space-y-6">
            <!-- Diagnostic Header Status -->
            <div class="flex items-center gap-4 border-b border-slate-800 pb-4">
                <div id="term-status-badge" class="p-3 rounded-2xl text-white shadow-xl">
                    <i id="term-status-icon" data-lucide="activity"></i>
                </div>
                <div>
                    <span id="term-category" class="text-[10px] font-black tracking-widest uppercase hud-font block text-indigo-400">Analysis Feed</span>
                    <h4 id="term-title" class="text-xl font-black text-white tracking-tight">Diagnostic Sub-Routine</h4>
                </div>
            </div>

            <!-- Descriptive Readout Frame -->
            <div class="space-y-2">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider hud-font">Combat Log Feedback</div>
                <p id="term-log-text" class="text-slate-300 text-sm leading-relaxed font-medium bg-slate-900 border border-slate-800 p-4 rounded-xl italic"></p>
            </div>

            <!-- Conceptual Core Learning Card Module -->
            <div class="bg-indigo-950/40 border border-indigo-500/20 rounded-2xl p-5 space-y-3 shadow-inner relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-5 pointer-events-none">
                    <i data-lucide="graduation-cap" class="w-32 h-32 text-indigo-400"></i>
                </div>
                <h5 class="text-xs font-black text-indigo-400 uppercase tracking-wider flex items-center gap-2 hud-font">
                    <i data-lucide="database-zap" class="w-4 h-4"></i>
                    Cognitive Rule Index & Syntax Formula
                </h5>
                <p id="term-rule-text" class="text-xs md:text-sm text-slate-300 leading-relaxed font-medium"></p>
            </div>
        </div>

        <!-- Terminal Nav Action Footer -->
        <div class="flex justify-end pt-4 border-t border-slate-900">
            <button id="term-action-btn" class="flex items-center gap-2 text-slate-950 font-black text-xs uppercase tracking-widest px-6 py-3.5 rounded-xl shadow-xl transform active:scale-95 transition-all">
                <span id="term-btn-label">Continue Engage</span>
                <i id="term-btn-icon" data-lucide="play"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // Structural Data Engine Matrix containing Game Scripts, Challenges, and Linguistic Framework Rules
    const combatDataMatrix = {
        1: {
            enemyName: "Goliath Sentinel v1.0",
            icon: "bot",
            inscription: "“The class was <span class='text-slate-400 font-medium underline decoration-dashed decoration-slate-600'>a collection of wild animals</span> during recess.”",
            scanned: "“The class <span class='text-cyan-400 font-black underline decoration-2 decoration-cyan-500 bg-cyan-950/40 px-1 rounded'>was a collection of wild animals</span> during recess.”",
            hint: "Notice the sentence directly substitutes the classroom's identity. It maps the sensory attributes of animals straight onto the students without structural 'like/as' comparison blocks.",
            weapons: [
                { type: "Simile Bolt", state: "fail", title: "Target Mismatch Error", log: "Impact structural deflection! The Simile analysis subroutine found no explicit comparative connector tags (like, as) embedded within the target phrase structure.", rule: "Similes require direct relational anchor points (e.g., 'The class acted LIKE wild animals') to link concepts. Because this anchor point is completely missing, the simile array failed to synchronize." },
                { type: "Metaphor Core", state: "hit", title: "Structural Target Cleared!", log: "Direct Critical Impact! The system confirmed a direct equation model. The context is perfectly swapped into a secondary form natively.", rule: "Metaphors directly declare that one entity *is* or *was* another symbol to apply descriptive traits seamlessly. It merges the subject into the image immediately.", damage: 50 },
                { type: "Personification Array", state: "fail", title: "Category Mismatch Error", log: "Shields held perfectly! Personification requires giving human mental capabilities or vocal abilities to objects. The targets here are already human students.", rule: "Personification maps uniquely human actions or characteristics onto non-human targets (e.g., 'The wind wept'). Since this statement maps animals onto human students, personification rules do not apply." }
            ]
        },
        2: {
            enemyName: "Vortex Air-Fiend v2.4",
            icon: "wind",
            inscription: "“The old engines groan and <span class='text-slate-400 font-medium underline decoration-dashed decoration-slate-600'>protest out loud</span> whenever we accelerate.”",
            scanned: "“The old engines <span class='text-cyan-400 font-black underline decoration-2 decoration-cyan-500 bg-cyan-950/40 px-1 rounded'>groan and protest out loud</span> whenever we accelerate.”",
            hint: "Can regular steel engine parts literally feel discomfort, groan, or express vocal social protest? Who usually performs those actions?",
            weapons: [
                { type: "Metaphor Core", state: "fail", title: "Category Mismatch Error", log: "Impact absorbed by defense shield! The weapon tried to map identity substitution, but the target sentence tracks an operational performance loop instead.", rule: "Metaphors change identity parameters completely (e.g., 'The engine is a roaring beast'). This challenge highlights an operational action state instead, calling for action-centric properties." },
                { type: "Personification Array", state: "hit", title: "Target Structure Cleared!", log: "Direct Hit! The automated arrays validated human-exclusive social behaviors and indicators successfully linked with a machine element.", rule: "Personification breathes life into inanimate targets by applying unique human physical actions (groaning, protesting, speaking) to mechanical items or objects.", damage: 50 },
                { type: "Simile Bolt", state: "fail", title: "Target Mismatch Error", log: "Systems conflict! The syntax engine searched for explicit relational connector blocks, but returned an empty array response.", rule: "Similes bridge items using connector codes like 'as' or 'like'. Without those markers present, the simile tracking loop fails." }
            ]
        },
        3: {
            enemyName: "Core Crypt Overlord",
            icon: "box",
            inscription: "“This text packet weighs <span class='text-slate-400 font-medium underline decoration-dashed decoration-slate-600'>a literal million tons</span>; my arms are snapped.”",
            scanned: "“This text packet weighs <span class='text-cyan-400 font-black underline decoration-2 decoration-cyan-500 bg-cyan-950/40 px-1 rounded'>a literal million tons</span>; my arms are snapped.”",
            hint: "Examine physical weight constraints. Can a packet of papers physically measure a million tons or shatter human bones? Is it scaling reality up to show intense emotion?",
            weapons: [
                { type: "Simile Bolt", state: "fail", title: "Target Mismatch Error", log: "Deflection recorded! The syntax analyzer discovered zero comparative connector nodes embedded inside the structural text parameters.", rule: "A simile compares terms proportionally using structural flags. Without explicit keywords like 'like' or 'as' tying the weights together, a simile configuration cannot form." },
                { type: "Personification Array", state: "fail", title: "Category Mismatch Error", log: "Impact absorbed! The object does not take on human social intelligence or performance actions. It simply outlines an abstract measure of physical property scale.", rule: "Personification requires objects to act out distinctly human identities. Simple changes to weight metrics, even extreme ones, do not count as human actions or behaviors." },
                { type: "Hyperbole Drive", state: "hit", title: "Boss Armor Eradicated!", log: "Critical Shockwave Implosion! The terminal isolated a massive distortion of literal fact used specifically to emphasize scale and frustration.", rule: "Hyperbole uses intentional exaggeration to magnify emotional realities. By creating impossible physical scales (a million tons), it emphasizes a heavy object.", damage: 100 }
            ]
        }
    };

    // Tracking Systems Configuration
    let activeLevelNode = 1;
    let scoreAccumulated = 0;
    let comboStreakMultiplier = 0;
    let trackerPlayerHP = 100;
    let trackerEnemyHP = 100;
    let xRayScannerActivated = false;

    function renderActiveCombatFrame(levelId) {
        setTimeout(() => lucide.createIcons(), 5);

        // Core Victory Check Loop
        if (levelId === "victory") {
            document.getElementById('learning-terminal').remove();
            document.getElementById('attack-grid').innerHTML = "";
            document.getElementById('btn-scan').remove();
            
            document.getElementById('enemy-name').innerText = "SYSTEM SECURED";
            document.getElementById('enemy-avatar-wrapper').className = "p-8 bg-emerald-500/10 border-2 border-emerald-500 text-emerald-400 rounded-full shadow-2xl shadow-emerald-500/20";
            document.getElementById('enemy-icon').setAttribute('data-lucide', 'shield-check');
            
            document.getElementById('riddle-string').innerHTML = `
                <div class='text-center py-4 space-y-2'>
                    <span class='text-emerald-400 font-black uppercase text-sm block tracking-widest hud-font'>Arena Conquered!</span>
                    <span class='text-sm text-slate-300 font-semibold block'>All Grade 7 figures of speech checkpoints successfully analyzed. Your terminal operations are operating at peak logic metrics.</span>
                </div>
            `;
            setTimeout(() => lucide.createIcons(), 5);
            return;
        }

        const dataNode = combatDataMatrix[levelId];

        // Setup Graphics parameters
        document.getElementById('enemy-name').innerText = dataNode.enemyName;
        document.getElementById('enemy-icon').setAttribute('data-lucide', dataNode.icon);
        
        // Sync Scanner View states cleanly
        document.getElementById('riddle-string').innerHTML = xRayScannerActivated ? dataNode.scanned : dataNode.inscription;

        // Reset Armor/Health Bars for New Monsters
        trackerEnemyHP = 100;
        document.getElementById('enemy-hp-bar').style.width = `${trackerEnemyHP}%`;

        // Render Weapon Action Control Buttons
        const buttonGrid = document.getElementById('attack-grid');
        buttonGrid.innerHTML = "";

        dataNode.weapons.forEach(wpn => {
            const btn = document.createElement('button');
            btn.className = "bg-slate-900 hover:bg-indigo-950/40 border-2 border-slate-800 hover:border-indigo-500 px-4 py-3.5 rounded-xl text-xs font-black text-slate-200 hud-font tracking-wider uppercase transition-all flex items-center justify-between group active:scale-95";
            btn.innerHTML = `
                <span>${wpn.type}</span>
                <i data-lucide="crosshair" class="w-4 h-4 text-slate-600 group-hover:text-indigo-400 group-hover:rotate-45 transition-all"></i>
            `;
            btn.onclick = () => fireWeaponRoutine(wpn);
            buttonGrid.appendChild(btn);
        });

        setTimeout(() => lucide.createIcons(), 5);
    }

    function fireWeaponRoutine(weapon) {
        const modal = document.getElementById('learning-terminal');
        const badge = document.getElementById('term-status-badge');
        const icon = document.getElementById('term-status-icon');
        const actionBtn = document.getElementById('term-action-btn');

        // Apply textual readouts across terminal components
        document.getElementById('term-title').innerText = weapon.title;
        document.getElementById('term-log-text').innerText = weapon.log;
        document.getElementById('term-rule-text').innerText = weapon.rule;

        if (weapon.state === "hit") {
            // Calculate Damage Values on Enemy Health
            trackerEnemyHP -= weapon.damage;
            document.getElementById('enemy-hp-bar').style.width = `${trackerEnemyHP}%`;

            // Adjust Combat Multipliers
            comboStreakMultiplier++;
            scoreAccumulated += (100 * comboStreakMultiplier);
            
            // Sync HUD displays
            document.getElementById('streak-val').innerText = `x${comboStreakMultiplier}`;
            document.getElementById('score-val').innerText = String(scoreAccumulated).padStart(4, '0');

            // Set success styling
            badge.className = "p-3 rounded-2xl bg-emerald-600 shadow-lg shadow-emerald-600/20 text-white animate-pulse";
            icon.setAttribute('data-lucide', 'shield-check');
            document.getElementById('term-category').innerText = "Impact Sync Confirmed";
            document.getElementById('term-category').className = "text-[10px] font-black tracking-widest uppercase hud-font block text-emerald-400";

            actionBtn.className = "flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black text-xs uppercase tracking-widest px-6 py-4 rounded-xl shadow-xl shadow-emerald-500/10";
            document.getElementById('term-btn-label').innerText = "Execute Next Infiltration";
            document.getElementById('term-btn-icon').setAttribute('data-lucide', 'skip-forward');

            actionBtn.onclick = () => {
                modal.classList.add('hidden');
                // Deactivate clue scanner state when transitioning scenes to prompt student observation
                if (xRayScannerActivated) {
                    document.getElementById('btn-scan').click();
                }
                activeLevelNode = (activeLevelNode === Object.keys(combatDataMatrix).length) ? "victory" : activeLevelNode + 1;
                renderActiveCombatFrame(activeLevelNode);
            };

        } else {
            // Apply Damage Penalties to Player Health
            trackerPlayerHP -= 25;
            document.getElementById('player-hp-bar').style.width = `${trackerPlayerHP}%`;

            // Reset Combos
            comboStreakMultiplier = 0;
            document.getElementById('streak-val').innerText = `x${comboStreakMultiplier}`;

            // Trigger visual hit effect on viewport floor
            document.getElementById('combat-floor').classList.add('animate-flash');
            setTimeout(() => document.getElementById('combat-floor').classList.remove('animate-flash'), 600);

            // Set trap styling
            badge.className = "p-3 rounded-2xl bg-red-600 shadow-lg shadow-red-600/20 text-white";
            icon.setAttribute('data-lucide', 'shield-alert');
            document.getElementById('term-category').innerText = "Deflection Alert Fault";
            document.getElementById('term-category').className = "text-[10px] font-black tracking-widest uppercase hud-font block text-red-400";

            if (trackerPlayerHP <= 0) {
                // Game Over Terminal Trigger Routine
                document.getElementById('term-title').innerText = "System Defeated";
                document.getElementById('term-log-text').innerText = "The syntax guardian overrode your terminal links. Your core files have dropped to critical levels.";
                document.getElementById('term-btn-label').innerText = "Reboot Terminal System";
                document.getElementById('term-btn-icon').setAttribute('data-lucide', 'refresh-cw');
                actionBtn.className = "flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white font-black text-xs uppercase tracking-widest px-6 py-4 rounded-xl shadow-xl shadow-red-600/20";
                
                actionBtn.onclick = () => {
                    trackerPlayerHP = 100;
                    scoreAccumulated = 0;
                    comboStreakMultiplier = 0;
                    activeLevelNode = 1;
                    document.getElementById('player-hp-bar').style.width = `${trackerPlayerHP}%`;
                    document.getElementById('streak-val').innerText = `x0`;
                    document.getElementById('score-val').innerText = "0000";
                    modal.classList.add('hidden');
                    if (xRayScannerActivated) {
                        document.getElementById('btn-scan').click();
                    }
                    renderActiveCombatFrame(activeLevelNode);
                };
            } else {
                // Standard retry sequence
                document.getElementById('term-btn-label').innerText = "Recalibrate Capacitors";
                document.getElementById('term-btn-icon').setAttribute('data-lucide', 'rotate-ccw');
                actionBtn.className = "flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-black text-xs uppercase tracking-widest px-6 py-4 rounded-xl";
                
                actionBtn.onclick = () => modal.classList.add('hidden');
            }
        }

        modal.classList.remove('hidden');
        setTimeout(() => lucide.createIcons(), 5);
    }

    // Connect X-Ray Analysis Scanner Controls
    document.getElementById('btn-scan').onclick = function() {
        xRayScannerActivated = !xRayScannerActivated;
        this.classList.toggle('border-cyan-500/40');
        this.classList.toggle('border-cyan-400');
        this.classList.toggle('bg-cyan-950/40');
        this.classList.toggle('text-cyan-300');

        const activeNode = combatDataMatrix[activeLevelNode];
        // Instantly alter content mapping types based on interactive scanner modes
        document.getElementById('riddle-string').innerHTML = xRayScannerActivated ? activeNode.scanned : activeNode.inscription;
        
        // Render or hide custom strategy prompts inside log feed windows
        if(xRayScannerActivated) {
            const hintBox = document.createElement('div');
            hintBox.id = "temp-hint-panel";
            hintBox.className = "mt-3 p-3 bg-cyan-950/20 border border-cyan-500/20 rounded-xl text-xs text-cyan-300 font-medium leading-relaxed animate-spawn";
            hintBox.innerHTML = `<strong>Scanner Diagnostic Clue:</strong> ${activeNode.hint}`;
            document.getElementById('riddle-string').appendChild(hintBox);
        } else {
            const existingHint = document.getElementById('temp-hint-panel');
            if (existingHint) existingHint.remove();
        }
    };

    // Initialize application execution engine
    renderActiveCombatFrame(activeLevelNode);
</script>

</body>
</html>
