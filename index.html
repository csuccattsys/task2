<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lost Amulet of Rhetoric - Grade 7 Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c1910;
        }
        .fantasy-title {
            font-family: 'Cinzel', serif;
        }
        /* Custom Keyframe Game Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 3s infinite ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }
        /* Style for active highlighted clues inside text */
        .clue-highlight {
            border-bottom: 2px dashed #eab308;
            color: #fde047;
            font-weight: bold;
            padding: 0 2px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="game-viewport" class="w-full max-w-4xl bg-stone-900 border-4 border-amber-600 rounded-3xl shadow-2xl overflow-hidden relative flex flex-col md:flex-row h-[600px]">
    
    <div class="w-full md:w-1/2 bg-gradient-to-b from-emerald-950 to-stone-950 relative border-b-4 md:border-b-0 md:border-r-4 border-amber-600 flex flex-col justify-between p-4">
        
        <div class="flex items-center justify-between z-10">
            <div class="flex items-center gap-2 bg-black/40 border border-white/10 px-3 py-1.5 rounded-xl">
                <i data-lucide="award" class="w-4 h-4 text-amber-400"></i>
                <span class="text-xs font-bold text-amber-200 uppercase tracking-wider">XP: <span id="game-xp">0</span></span>
            </div>
            <div class="flex items-center gap-2 bg-black/40 border border-white/10 px-3 py-1.5 rounded-xl">
                <i data-lucide="heart" class="w-4 h-4 text-red-500 fill-red-500"></i>
                <span class="text-xs font-bold text-red-200 uppercase tracking-wider">Hearts: <span id="game-hearts">3</span></span>
            </div>
        </div>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none p-12">
            <div id="avatar-container" class="animate-float flex flex-col items-center gap-4 transition-all duration-300">
                <div class="p-6 bg-emerald-900/40 border-2 border-emerald-500/30 rounded-full bg-blur shadow-2xl shadow-emerald-500/20">
                    <i id="scene-icon" data-lucide="castle" class="w-20 h-20 text-emerald-400"></i>
                </div>
                <div id="avatar-label" class="bg-black/60 border border-emerald-500/40 px-4 py-1 rounded-full text-xs font-bold text-emerald-300 uppercase tracking-widest">
                    Cabadbaran Ruins
                </div>
            </div>
        </div>

        <div class="bg-black/60 backdrop-blur-md border border-white/10 p-4 rounded-xl z-10">
            <div class="text-[10px] uppercase font-bold text-amber-500 tracking-widest mb-1" id="scene-node-tag">Node 01</div>
            <p id="scene-narrative" class="text-xs md:text-sm text-stone-200 font-medium leading-relaxed italic">
                Loading game coordinates...
            </p>
        </div>

    </div>

    <div class="w-full md:w-1/2 bg-stone-950 p-6 flex flex-col justify-between h-full relative overflow-y-auto">
        
        <div id="interactive-deck" class="space-y-6 my-auto">
            <div class="space-y-1">
                <h2 id="challenge-title" class="text-xl font-bold text-white tracking-tight font-fantasy text-amber-500">The Trial of Identity</h2>
                <p id="challenge-instructions" class="text-xs text-stone-400 font-semibold">Examine the riddle carefully and project the correct device.</p>
            </div>

            <div class="bg-stone-900 border border-stone-800 rounded-2xl p-4 relative shadow-inner">
                <div class="absolute -top-2.5 left-4 bg-amber-600 text-stone-950 text-[9px] font-extrabold px-2 py-0.5 rounded uppercase tracking-wider shadow">Riddle Text</div>
                <p id="riddle-box" class="text-sm md:text-base text-stone-100 font-bold leading-relaxed pt-2"></p>
                
                <button id="btn-hint" class="mt-3 flex items-center gap-1.5 text-xs text-amber-500 font-bold hover:text-amber-400 transition-colors focus:outline-none">
                    <i data-lucide="help-circle" class="w-3.5 h-3.5"></i>
                    <span>Consult Spellbook Hint</span>
                </button>
                <p id="hint-display" class="hidden mt-2 text-xs text-stone-400 border-t border-stone-800 pt-2 italic font-medium leading-relaxed"></p>
            </div>

            <div id="choices-container" class="flex flex-col gap-3"></div>
        </div>

        <div id="learning-modal" class="hidden absolute inset-x-0 bottom-0 top-0 bg-stone-950/95 p-6 flex flex-col justify-between z-20 animate-slide-up border-t-4 border-amber-600">
            <div class="space-y-4">
                <div class="flex items-center gap-3">
                    <div id="modal-icon-bg" class="p-2.5 rounded-xl text-white">
                        <i id="modal-icon" data-lucide="shield-alert" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <span id="modal-status-tag" class="text-[10px] font-black tracking-widest uppercase block">Result Feedback</span>
                        <h4 id="modal-heading" class="text-lg font-extrabold text-white">Heading Title</h4>
                    </div>
                </div>

                <p id="modal-feedback-text" class="text-sm text-stone-300 leading-relaxed font-medium"></p>

                <div class="bg-stone-900 border border-stone-800 rounded-xl p-4 space-y-2">
                    <h5 class="text-xs font-bold text-amber-500 uppercase tracking-wider flex items-center gap-1.5">
                        <i data-lucide="graduation-cap" class="w-4 h-4"></i>
                        Spellbook Rule Explanation
                    </h5>
                    <p id="modal-rule-text" class="text-xs text-stone-400 leading-relaxed font-medium"></p>
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <button id="modal-action-btn" class="flex items-center gap-2 text-stone-950 font-black text-sm px-6 py-3 rounded-xl shadow-lg shadow-amber-600/10 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                    <span id="modal-btn-label">Action</span>
                    <i id="modal-btn-icon" data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

    </div>
</div>

<script>
    // Pure Game Dataset Engine Mapping Imagery, Choices, and Learning Explanations
    const gameEngineMatrix = {
        1: {
            nodeTag: "Trial Phase 01",
            title: "Gate of the Forest Guardian",
            icon: "castle",
            avatarLabel: "Cabadbaran Ruins Gate",
            narrative: "An ancient, moss-covered stone sentinel blocks the passage. 'To enter the sanctuary, you must decrypt the phrase upon my chest!'",
            riddle: "“The classroom <span class='clue-target'>was a zoo</span> during recess.”",
            hint: "Look closely at 'was a zoo'. It does not use 'like' or 'as' to create a comparison. It directly equates the room to a zoo.",
            clueText: "“The classroom <span class='clue-highlight'>was a zoo</span> during recess.”",
            choices: [
                {
                    text: "Cast a Simile Spell Key",
                    status: "trap",
                    heading: "Spell Shield Triggered!",
                    icon: "shield-alert",
                    bg: "bg-red-600",
                    feedback: "The gate glows crimson! The sentinel booms: 'Incorrect casting! A Simile forces clear bridge markers like \"like\" or \"as\". This phrase has no matching connectors!'",
                    rule: "Similes make descriptions explicit by joining separate concepts using comparative connector keywords. For instance: 'The classroom was LIKE a zoo'."
                },
                {
                    text: "Cast a Metaphor Spell Key",
                    status: "success",
                    heading: "Barrier Shattered!",
                    icon: "sparkles",
                    bg: "bg-emerald-600",
                    feedback: "The sentinel transforms into safe green light! 'Magnificent grammar insight! You identified a direct equation of state without relying on structural bridges.'",
                    rule: "Metaphors match two completely separate terms directly to carry descriptions immediately. Calling a wild room a 'zoo' paints a picture cleanly.",
                    xpReward: 100,
                    jump: 2
                }
            ]
        },
        2: {
            nodeTag: "Trial Phase 02",
            title: "The Courtyard of Echoes",
            icon: "wind",
            avatarLabel: "Whispering Woods",
            narrative: "A magical vortex blocks the courtyard bridge. Swirling leaves organize themselves into an active sentence pattern before you.",
            riddle: "“The autumn leaves scraped across the pavement, <span class='clue-target'>whispering secrets</span> to the wind.”",
            hint: "Can ordinary autumn leaves physically whisper secrets to each other? Who usually whispers?",
            clueText: "“The autumn leaves scraped across the pavement, <span class='clue-highlight'>whispering secrets</span> to the wind.”",
            choices: [
                {
                    text: "Channel Personification Essence",
                    status: "success",
                    heading: "Vortex Pacified!",
                    icon: "sparkles",
                    bg: "bg-emerald-600",
                    feedback: "The storm winds clear into safe directional path markers! 'Spot on, traveler! You accurately identified human vocal characteristics instilled into lifeless nature.'",
                    rule: "Personification maps human behaviors, actions, or mental attributes directly onto plants, animals, or objects to bring descriptions to life.",
                    xpReward: 100,
                    jump: 3
                },
                {
                    text: "Channel Metaphor Essence",
                    status: "trap",
                    heading: "Elemental Backlash!",
                    icon: "shield-alert",
                    bg: "bg-red-600",
                    feedback: "The vortex blasts you backward! 'Error! The sentence doesn't state that the leaves ARE humans; it gives them human-exclusive actions!'",
                    rule: "A metaphor substitutes identity directly (e.g., 'The leaves were whispered ghosts'). When objects simply perform human actions, it falls under personification rules."
                }
            ]
        },
        3: {
            nodeTag: "Final Core Chamber",
            title: "The Treasury Golem Vault",
            icon: "box",
            avatarLabel: "The Amulet Vault",
            narrative: "A massive mechanical golem protects the treasure chest. It stamps its feet and challenges you to one final validation test.",
            riddle: "“I am so hungry I <span class='clue-target'>could eat an entire elephant</span> right now!”",
            hint: "Is it physically, biologically possible for a human being to digest a whole elephant? Or is it an intentional exaggeration?",
            clueText: "“I am so hungry I <span class='clue-highlight'>could eat an entire elephant</span> right now!”",
            choices: [
                {
                    text: "Deploy a Simile Core",
                    status: "trap",
                    heading: "Systems Overload!",
                    icon: "shield-alert",
                    bg: "bg-red-600",
                    feedback: "The golem charges its weapon system! 'Mismatched properties! There are no explicit connective syntax structures embedded inside this expression!'",
                    rule: "Similes explicitly connect terms using structural flags ('as' / 'like'). Without those terms present, simile verification algorithms fail."
                },
                {
                    text: "Deploy a Hyperbole Core",
                    status: "success",
                    heading: "The Ancient Amulet Unlocked!",
                    icon: "trophy",
                    bg: "bg-amber-500",
                    feedback: "The golempowers down and safely slides away. 'Incredible analysis! You unlocked the safe path by exposing my massive structural exaggeration.'",
                    rule: "Hyperbole uses intentional exaggeration to emphasize strong feelings or create a dramatic effect. Eating an elephant emphasizes extreme hunger.",
                    xpReward: 150,
                    jump: "end"
                }
            ]
        }
    };

    let activeStateNode = 1;
    let accumulatedXP = 0;
    let userHeartsRemaining = 3;

    function renderActiveGameStage(nodeId) {
        setTimeout(() => lucide.createIcons(), 5);

        if(nodeId === 'end') {
            document.getElementById('interactive-deck').innerHTML = `
                <div class="text-center py-12 animate-slide-up space-y-4">
                    <div class="inline-flex p-4 bg-amber-500/10 border border-amber-500/30 rounded-full text-amber-500 mb-2">
                        <i data-lucide="trophy" class="w-16 h-16"></i>
                    </div>
                    <h2 class="text-2xl font-black text-white font-fantasy uppercase tracking-wider text-amber-500">Victory Confirmed!</h2>
                    <p class="text-stone-300 text-sm leading-relaxed max-w-sm mx-auto">Sensational performance! You conquered all linguistic chambers, completed the Grade 7 learning matrix, and finished with a grand total of ${accumulatedXP} XP!</p>
                </div>
            `;
            // Final Game State Art Update
            document.getElementById('scene-icon').setAttribute('data-lucide', 'award');
            document.getElementById('avatar-label').innerText = "Quest Master";
            document.getElementById('scene-node-tag').innerText = "Complete";
            document.getElementById('scene-narrative').innerText = "The Amulet of Rhetoric safely power links with your avatar system.";
            setTimeout(() => lucide.createIcons(), 5);
            return;
        }

        const dataNode = gameEngineMatrix[nodeId];

        // Update Visual Stage Graphics Metadata
        document.getElementById('scene-node-tag').innerText = dataNode.nodeTag;
        document.getElementById('scene-narrative').innerText = dataNode.narrative;
        document.getElementById('avatar-label').innerText = dataNode.avatarLabel;
        document.getElementById('scene-icon').setAttribute('data-lucide', dataNode.icon);

        // Update Interactive Interface Deck Text fields
        document.getElementById('challenge-title').innerText = dataNode.title;
        document.getElementById('riddle-box').innerHTML = dataNode.riddle;
        document.getElementById('hint-display').innerText = dataNode.hint;
        document.getElementById('hint-display').classList.add('hidden');

        // Render Action Selection Buttons
        const choiceDeck = document.getElementById('choices-container');
        choiceDeck.innerHTML = "";

        dataNode.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left bg-stone-900 border-2 border-stone-800 hover:border-amber-600 hover:bg-stone-850 p-4 rounded-xl font-bold text-stone-200 text-sm transition-all flex items-center justify-between group active:scale-[0.99]";
            btn.innerHTML = `
                <span>${choice.text}</span>
                <i data-lucide="crosshair" class="w-4 h-4 text-stone-500 group-hover:text-amber-500 transition-colors"></i>
            `;
            btn.onclick = () => evaluateUserGameAction(choice);
            choiceDeck.appendChild(btn);
        });

        setTimeout(() => lucide.createIcons(), 5);
    }

    function evaluateUserGameAction(choice) {
        const modal = document.getElementById('learning-modal');
        const modalIconBg = document.getElementById('modal-icon-bg');
        const actionBtn = document.getElementById('modal-action-btn');

        // Apply text variables to modal layout
        document.getElementById('modal-heading').innerText = choice.heading;
        document.getElementById('modal-feedback-text').innerText = choice.feedback;
        document.getElementById('modal-rule-text').innerText = choice.rule;

        // Apply custom color theme states
        modalIconBg.className = `p-2.5 rounded-xl text-white ${choice.bg}`;
        document.getElementById('modal-icon').setAttribute('data-lucide', choice.icon);

        if(choice.status === "success") {
            // Success Path logic
            accumulatedXP += choice.xpReward;
            document.getElementById('game-xp').innerText = accumulatedXP;

            document.getElementById('modal-status-tag').innerText = "System Synchronized";
            document.getElementById('modal-status-tag').className = "text-[10px] font-black tracking-widest uppercase block text-emerald-500";
            
            actionBtn.className = "flex items-center gap-2 bg-amber-500 hover:bg-amber-600 text-stone-950 font-black text-sm px-6 py-3 rounded-xl shadow-lg shadow-amber-600/20 transition-all transform hover:-translate-y-0.5";
            document.getElementById('modal-btn-label').innerText = "Advance Path";
            document.getElementById('modal-btn-icon').setAttribute('data-lucide', 'arrow-right');

            actionBtn.onclick = () => {
                modal.classList.add('hidden');
                activeStateNode = choice.jump;
                renderActiveGameStage(activeStateNode);
            };
        } else {
            // Trap path logic
            userHeartsRemaining--;
            document.getElementById('game-hearts').innerText = userHeartsRemaining;
            
            // Trigger haptic vibration effect
            document.getElementById('game-viewport').classList.add('animate-shake');
            setTimeout(() => document.getElementById('game-viewport').classList.remove('animate-shake'), 400);

            document.getElementById('modal-status-tag').innerText = "Warning Malfunction";
            document.getElementById('modal-status-tag').className = "text-[10px] font-black tracking-widest uppercase block text-red-500";

            if(userHeartsRemaining <= 0) {
                // Game Over Loop State
                document.getElementById('modal-heading').innerText = "Critical System Failure";
                document.getElementById('modal-feedback-text').innerText = "Your hearts have depleted completely. The grammar defense arrays locked your avatar out of the archive system.";
                document.getElementById('modal-btn-label').innerText = "Restart Mission";
                document.getElementById('modal-btn-icon').setAttribute('data-lucide', 'refresh-cw');
                actionBtn.className = "flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-6 py-3 rounded-xl shadow-lg transition-all";
                
                actionBtn.onclick = () => {
                    userHeartsRemaining = 3;
                    accumulatedXP = 0;
                    activeStateNode = 1;
                    document.getElementById('game-hearts').innerText = userHeartsRemaining;
                    document.getElementById('game-xp').innerText = accumulatedXP;
                    modal.classList.add('hidden');
                    renderActiveGameStage(activeStateNode);
                };
            } else {
                // Standard retry step
                document.getElementById('modal-btn-label').innerText = "Recalibrate Array";
                document.getElementById('modal-btn-icon').setAttribute('data-lucide', 'rotate-ccw');
                actionBtn.className = "flex items-center gap-2 bg-stone-800 hover:bg-stone-700 text-stone-200 font-bold text-sm px-6 py-3 rounded-xl border border-stone-700 transition-all";
                
                actionBtn.onclick = () => modal.classList.add('hidden');
            }
        }

        modal.classList.remove('hidden');
        setTimeout(() => lucide.createIcons(), 5);
    }

    // Connect Hint Activation Actions
    document.getElementById('btn-hint').onclick = function() {
        const hb = document.getElementById('hint-display');
        hb.classList.toggle('hidden');
        
        // Dynamic string substitution to trigger custom visual text highlight
        const activeNode = gameEngineMatrix[activeStateNode];
        document.getElementById('riddle-box').innerHTML = hb.classList.contains('hidden') ? activeNode.riddle : activeNode.clueText;
    };

    // Bootstrap Entry Ignition Hook
    renderActiveGameStage(activeStateNode);
</script>

</body>
</html>
