<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 7 Rhetoric Flashcards</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Vector Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top center, #f8fafc 0%, #f1f5f9 100%);
        }
        /* 3D Card Flip Mechanics */
        .perspective-container {
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1.5rem;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        /* Highlight styles for the active hint mode */
        .syntax-highlight {
            background-color: #fef08a;
            border-bottom: 2px dashed #ca8a04;
            padding: 0 4px;
            border-radius: 4px;
            color: #854d0e;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-8 antialiased selection:bg-indigo-100">

    <!-- Top Navigation Header Dashboard -->
    <div class="w-full max-w-xl flex items-center justify-between bg-white border border-slate-200/80 rounded-2xl px-5 py-3.5 shadow-sm">
        <div class="flex items-center gap-2.5">
            <div class="p-2 bg-indigo-50 text-indigo-600 rounded-xl">
                <i data-lucide="layers" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold text-slate-800 tracking-tight">Rhetoric Deck</h1>
                <p class="text-[11px] font-semibold text-slate-400">Grade 7 Figures of Speech</p>
            </div>
        </div>
        <!-- Live Deck Metric Indicator -->
        <div class="bg-slate-100 border border-slate-200 px-3 py-1 rounded-full text-xs font-bold text-slate-600">
            Card <span id="current-index">1</span> of <span id="total-cards">3</span>
        </div>
    </div>

    <!-- Main Dynamic Interface Layout Window -->
    <div class="w-full max-w-xl my-auto py-8 space-y-6">
        
        <!-- Active Strategy Instruction Tip Banner -->
        <div class="bg-indigo-50/60 border border-indigo-100/80 rounded-2xl p-4 flex items-start gap-3.5">
            <div class="p-2 bg-white rounded-xl text-indigo-600 shadow-sm border border-indigo-100 shrink-0">
                <i data-lucide="lightbulb" class="w-4 h-4 fill-indigo-50"></i>
            </div>
            <div class="space-y-0.5">
                <h3 class="text-xs font-extrabold text-indigo-900 uppercase tracking-wider">Flashcard Tip</h3>
                <p id="strategy-guide" class="text-xs text-slate-600 font-medium leading-relaxed">Loading guide parameters...</p>
            </div>
        </div>

        <!-- 3D Flashcard Presentation Viewport -->
        <div class="perspective-container w-full h-[280px] cursor-pointer group">
            <div id="flashcard" class="card-inner shadow-xl hover:shadow-2xl hover:-translate-y-0.5 transition-all duration-300">
                
                <!-- FRONT SIDE: Sentence Challenge Face -->
                <div class="card-front bg-white border border-slate-200/80 p-6 flex flex-col justify-between items-center relative">
                    <div class="w-full flex justify-between items-center">
                        <span id="badge-front" class="bg-slate-100 text-slate-700 text-[10px] font-bold px-2.5 py-0.5 rounded-md uppercase tracking-wider border border-slate-200/50">Challenge Case</span>
                        <!-- Clue Tool button inside front of card -->
                        <button id="btn-clue" class="p-1.5 bg-slate-50 hover:bg-amber-50 border border-slate-200 hover:border-amber-300 rounded-lg text-slate-400 hover:text-amber-600 transition-colors z-10" title="Reveal clue context highlight">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                    <p id="phrase-front" class="text-lg font-bold text-slate-800 tracking-wide leading-relaxed px-4 select-text"></p>
                    
                    <div class="text-xs font-bold text-slate-400 flex items-center gap-1.5 uppercase tracking-wider">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5 animate-pulse text-indigo-500"></i>
                        <span>Click card space to flip & verify</span>
                    </div>
                </div>

                <!-- BACK SIDE: Answer and Rule Core Matrix Face -->
                <div class="card-back bg-gradient-to-br from-indigo-900 to-slate-950 p-6 flex flex-col justify-between border border-indigo-950 text-left">
                    <div class="flex justify-between items-center">
                        <span class="bg-indigo-500/20 text-indigo-300 text-[10px] font-bold px-2.5 py-0.5 rounded-md uppercase tracking-wider border border-indigo-500/30">Verified Analysis</span>
                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/50"></div>
                    </div>

                    <!-- Core Answer Values -->
                    <div class="space-y-2">
                        <div class="text-[10px] uppercase font-bold text-indigo-400 tracking-widest">Identified Device:</div>
                        <h2 id="device-back" class="text-2xl font-black text-white tracking-tight">Metaphor</h2>
                        <p id="rule-back" class="text-xs text-slate-300 font-medium leading-relaxed pt-1 border-t border-indigo-800/50"></p>
                    </div>

                    <div class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider flex items-center gap-1">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i>
                        <span>Click card space to flip back</span>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Bottom Actions Deck: Navigation and Logic Verification -->
    <div class="w-full max-w-xl flex flex-col items-center gap-4">
        
        <!-- Interactive Self-Check Evaluation Controls -->
        <div id="feedback-deck" class="w-full grid grid-cols-2 gap-3 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2">
            <button id="btn-fail" class="flex items-center justify-center gap-2 bg-white hover:bg-rose-50 border border-slate-200 hover:border-rose-300 text-slate-700 font-bold text-xs py-3 rounded-xl shadow-sm active:scale-[0.98] transition-all uppercase tracking-wider">
                <i data-lucide="x-circle" class="w-4 h-4 text-rose-500"></i>
                <span>Still Unsure</span>
            </button>
            <button id="btn-pass" class="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-3 rounded-xl shadow-md shadow-indigo-600/10 active:scale-[0.98] transition-all uppercase tracking-wider">
                <i data-lucide="check-circle-2" class="w-4 h-4 text-indigo-200 fill-indigo-500/20"></i>
                <span>I Mastered This</span>
            </button>
        </div>

        <!-- System Pagination Control Strip -->
        <div class="w-full flex justify-between items-center border-t border-slate-200/60 pt-4">
            <button id="nav-prev" class="flex items-center gap-1.5 px-4 py-2.5 text-xs font-bold text-slate-500 hover:text-slate-800 bg-white border border-slate-200 rounded-xl shadow-sm disabled:opacity-40 disabled:pointer-events-none transition-all">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                <span>Previous</span>
            </button>
            
            <div id="deck-stats" class="text-xs text-slate-400 font-bold tracking-wide">
                Mastered: <span id="mastered-count" class="text-slate-700 font-extrabold">0</span>
            </div>

            <button id="nav-next" class="flex items-center gap-1.5 px-4 py-2.5 text-xs font-bold text-slate-500 hover:text-slate-800 bg-white border border-slate-200 rounded-xl shadow-sm disabled:opacity-40 disabled:pointer-events-none transition-all">
                <span>Next Deck</span>
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </button>
        </div>

    </div>

<script>
    // Pure Modular Structural Dataset
    const flashcardDeckMatrix = [
        {
            tip: "Look for direct replacement attributes. If an author states identity value 'A' IS identity value 'B' without comparing tools like 'like' or 'as', it maps a metaphor structure.",
            textPlain: "“The classroom was a zoo during recess.”",
            textClue: "“The classroom <span class='syntax-highlight'>was a zoo</span> during recess.”",
            device: "Metaphor",
            rule: "A metaphor merges identity natively. Calling a room filled with active students a 'zoo' immediately attaches noise and chaotic behaviors to the environment without adding weak connector adjectives."
        },
        {
            tip: "Examine the verbs closely. When physical object units or landscapes execute functions exclusive to human thoughts, language, or logic, personification is running.",
            textPlain: "“The autumn leaves scraped across the pavement, whispering secrets to the wind.”",
            textClue: "“The autumn leaves scraped across the pavement, <span class='syntax-highlight'>whispering secrets</span> to the wind.”",
            device: "Personification",
            rule: "Personification maps human identity onto abstract items. Leaves cannot form conversational thoughts or hide secrets; giving them this human action creates a poetic sensory dynamic."
        },
        {
            tip: "Measure settings against biological or physical parameters. Massive extensions of reality designed to project emotional states are categorized under hyperbole.",
            textPlain: "“I am so hungry I could eat an entire elephant right now!”",
            textClue: "“I am so hungry I <span class='syntax-highlight'>could eat an entire elephant</span> right now!”",
            device: "Hyperbole",
            rule: "Hyperbole uses magnification instead of literal measurements. Consuming an entire elephant is physically impossible, but expanding the hunger scale emphasizes intense sensory feeling."
        }
    ];

    let currentCardPointer = 0;
    let clueModeActive = false;
    let cardIsFlipped = false;
    const cardsMasteredSet = new Set();

    function initializeApplicationDeck() {
        // Build Lucide graphics
        setTimeout(() => lucide.createIcons(), 5);

        // Sync numeric indicators
        document.getElementById('total-cards').innerText = flashcardDeckMatrix.length;
        renderActiveCardParameters();

        // Connect Flip Interactive Operations
        document.getElementById('flashcard').onclick = function(e) {
            // Prevent flip action if clicking the clue icon button explicitly
            if (e.target.closest('#btn-clue')) return;
            
            cardIsFlipped = !cardIsFlipped;
            this.classList.toggle('card-flipped', cardIsFlipped);
            
            // Render choice confirmation deck block once card has been rotated
            const feedbackDeck = document.getElementById('feedback-deck');
            if(cardIsFlipped) {
                feedbackDeck.className = "w-full grid grid-cols-2 gap-3 opacity-100 pointer-events-auto transition-all duration-300 transform translate-y-0";
            } else {
                feedbackDeck.className = "w-full grid grid-cols-2 gap-3 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2";
            }
        };

        // Wire Clue Highlighter Button
        document.getElementById('btn-clue').onclick = function() {
            clueModeActive = !clueModeActive;
            this.classList.toggle('bg-amber-100', clueModeActive);
            this.classList.toggle('border-amber-400', clueModeActive);
            this.classList.toggle('text-amber-700', clueModeActive);
            
            const activeCard = flashcardDeckMatrix[currentCardPointer];
            document.getElementById('phrase-front').innerHTML = clueModeActive ? activeCard.textClue : activeCard.textPlain;
        };

        // Wire Self-Check Calibration Buttons
        document.getElementById('btn-pass').onclick = () => {
            cardsMasteredSet.add(currentCardPointer);
            updateMasteryCounterMetric();
            triggerAutoAdvanceSequence();
        };

        document.getElementById('btn-fail').onclick = () => {
            cardsMasteredSet.delete(currentCardPointer);
            updateMasteryCounterMetric();
            triggerAutoAdvanceSequence();
        };

        // Connect Nav Controls
        document.getElementById('nav-prev').onclick = () => changeCardStepOffset(-1);
        document.getElementById('nav-next').onclick = () => changeCardStepOffset(1);
    }

    function renderActiveCardParameters() {
        const dataItem = flashcardDeckMatrix[currentCardPointer];
        
        // Reset card flip execution states cleanly before content swapping
        cardIsFlipped = false;
        document.getElementById('flashcard').classList.remove('card-flipped');
        document.getElementById('feedback-deck').className = "w-full grid grid-cols-2 gap-3 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2";

        // Inject Content Matrix variables
        document.getElementById('current-index').innerText = currentCardPointer + 1;
        document.getElementById('strategy-guide').innerText = dataItem.tip;
        document.getElementById('badge-front').innerText = `Challenge Node 0${currentCardPointer + 1}`;
        
        // Reset and check clue modes
        clueModeActive = false;
        const clueBtn = document.getElementById('btn-clue');
        clueBtn.className = "p-1.5 bg-slate-50 hover:bg-amber-50 border border-slate-200 hover:border-amber-300 rounded-lg text-slate-400 hover:text-amber-600 transition-colors z-10";
        document.getElementById('phrase-front').innerHTML = dataItem.textPlain;

        // Render back matrix elements
        document.getElementById('device-back').innerText = dataItem.device;
        document.getElementById('rule-back').innerText = dataItem.rule;

        // Verify Navigation boundary safety
        document.getElementById('nav-prev').disabled = (currentCardPointer === 0);
        document.getElementById('nav-next').disabled = (currentCardPointer === flashcardDeckMatrix.length - 1);

        setTimeout(() => lucide.createIcons(), 5);
    }

    function changeCardStepOffset(offsetValue) {
        currentCardPointer += offsetValue;
        renderActiveCardParameters();
    }

    function triggerAutoAdvanceSequence() {
        // Automatically close/flip card and move to next node if available
        setTimeout(() => {
            if (currentCardPointer < flashcardDeckMatrix.length - 1) {
                changeCardStepOffset(1);
            } else {
                // Return to first item smoothly if finalizing deck validation
                cardIsFlipped = false;
                document.getElementById('flashcard').classList.remove('card-flipped');
                document.getElementById('feedback-deck').className = "w-full grid grid-cols-2 gap-3 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2";
            }
        }, 350);
    }

    function updateMasteryCounterMetric() {
        document.getElementById('mastered-count').innerText = cardsMasteredSet.size;
    }

    // Initialize application script entry points
    initializeApplicationDeck();
</script>

</body>
</html>
